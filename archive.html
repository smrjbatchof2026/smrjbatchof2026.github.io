<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Archive | SMRJ '26</title>
    
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --accent-gold: #d4af37;
        }

        body {
            background: radial-gradient(circle, #1a1a1c 0%, #050505 100%);
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden; font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* Responsive Stage */
        .stage {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        /* The viewport that scales for zoom */
        #zoom-viewport {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center center;
            width: 100%;
            height: 100%;
        }

        #flipbook-container {
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .page-content {
            width: 100%; height: 100%;
            display: flex; background: #000;
        }

        .page-image {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        /* Floating Navigation Overlay */
        .floating-nav {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            white-space: nowrap;
        }

        .nav-btn {
            font-family: 'Cinzel', serif;
            color: var(--accent-gold);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .zoom-ctrl {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 2px 10px;
            gap: 12px;
        }

        .zoom-icon {
            cursor: pointer;
            font-size: 18px;
            color: white;
            opacity: 0.6;
            transition: 0.3s;
        }
        .zoom-icon:hover { opacity: 1; }

        /* Loader */
        #loader {
            position: fixed; inset: 0; background: #050505;
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }

        /* Device Specific Fixes */
        @media (max-width: 400px) { /* iPhone SE */
            .floating-nav { bottom: 20px; gap: 8px; padding: 8px 15px; }
            .nav-btn { font-size: 8px; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#d4af37]"></div></div>

    <header class="p-5 flex justify-between items-center z-50">
        <a href="index.html" class="cinzel text-[9px] tracking-widest text-white/40 hover:text-white transition">← BACK TO HOME</a>
        <div id="page-name" class="cinzel text-[9px] tracking-[0.4em] text-[#d4af37] text-center hidden sm:block">THE ARCHIVE</div>
        <div class="w-20 sm:hidden"></div> </header>

    <main class="stage">
        <div id="zoom-viewport">
            <div id="flipbook-container">
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/1.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/2.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/3.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/4.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/5.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/6.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/7.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/8.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/9.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/10.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/11.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/12.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/13.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/14.jpg" class="page-image"></div></div>
                <div class="page" data-name="SMRJ'26"><div class="page-content"><img src="assets/pages/15.jpg" class="page-image"></div></div>
            </div>
        </div>

        <nav class="floating-nav">
            <div class="nav-btn" id="prevBtn">Prev</div>
            
            <div class="zoom-ctrl">
                <span class="zoom-icon" id="zoomOut">−</span>
                <span id="pageNumber" class="montserrat text-[9px] font-bold tracking-widest text-white/40">01/15</span>
                <span class="zoom-icon" id="zoomIn">+</span>
            </div>

            <div class="nav-btn" id="nextBtn">Next</div>
        </nav>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('flipbook-container');
            const viewport = document.getElementById('zoom-viewport');
            const pages = document.querySelectorAll(".page");
            
            // Calculator for auto-fit dimensions
            function getOptimalSize() {
                const isMobile = window.innerWidth < 768;
                const ratio = 0.72; // Magazine aspect ratio
                
                let h, w;
                if (isMobile) {
                    w = window.innerWidth * 0.88;
                    h = w / ratio;
                    // Cap height for small phones (iPhone SE)
                    if (h > window.innerHeight * 0.7) {
                        h = window.innerHeight * 0.7;
                        w = h * ratio;
                    }
                } else {
                    h = window.innerHeight * 0.75;
                    w = h * ratio;
                }
                return { width: w, height: h };
            }

            const initial = getOptimalSize();

            const pageFlip = new St.PageFlip(container, {
                width: initial.width,
                height: initial.height,
                size: "stretch",
                showCover: true,
                usePortrait: true,
                drawShadow: true,
                flippingTime: 800,
                mobileScrollSupport: false
            });

            pageFlip.loadFromHTML(pages);

            // Zoom State
            let currentScale = 1;
            document.getElementById('zoomIn').onclick = () => {
                if (currentScale < 1.6) currentScale += 0.15;
                viewport.style.transform = `scale(${currentScale})`;
            };
            document.getElementById('zoomOut').onclick = () => {
                if (currentScale > 0.6) currentScale -= 0.15;
                viewport.style.transform = `scale(${currentScale})`;
            };

            // Updates
            pageFlip.on('flip', (e) => {
                const idx = e.data;
                document.getElementById('pageNumber').innerText = `${String(idx + 1).padStart(2, '0')}/15`;
                const name = pages[idx].getAttribute('data-name');
                document.getElementById('page-name').innerText = name.toUpperCase();
            });

            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

            // Resize Handler
            window.addEventListener('resize', () => {
                const s = getOptimalSize();
                pageFlip.update();
            });

            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1000);
        });
    </script>
</body>
</html>
